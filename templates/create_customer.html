<!-- templates/create_customer.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Customer</title>
</head>
<body>
    <h1>Add New Customer</h1>
    <form action="{{ url_for('auth.create_customer') }}" method="post">
        <label for="nik">NIK:</label>
        <input type="text" id="nik" name="nik" required><br>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required><br>
        <label for="max_tabung">Max Tabung:</label>
        <input type="number" id="max_tabung" name="max_tabung" required><br>
        <button type="submit">Add Customer</button>
    </form>
    <a href="{{ url_for('auth.get_all_customers') }}">Back to Customers List</a>
</body>
</html>
